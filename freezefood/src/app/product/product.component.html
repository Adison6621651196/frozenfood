<style>
.kfc-product-page {
  display: flex;
  min-height: calc(100vh - 75px);
  background: #ffffff;
}
.sidebar-menu {
  width: 200px;
  background: #ffffff;
  padding: 20px 0;
  position: sticky;
  top: 75px;
  height: fit-content;
  max-height: calc(100vh - 75px);
  overflow-y: auto;
  border-right: 1px solid #f0f0f0;
}
.menu-header {
  padding: 0 20px 15px;
  margin-bottom: 10px;
}
  .menu-header h2 {
  font-size: 1.2rem;
  font-weight: 600;
  font-family: inherit;
  color: #333;
  margin: 0;
}
.menu-categories {
  padding: 0;
}
  .menu-category {
  display: block;
  padding: 12px 20px;
  margin-bottom: 2px;
  cursor: pointer;
  transition: background-color 0.2s ease;
  color: #374151;
  background: transparent;
  border: none;
  font-size: 1rem;
  font-family: inherit;
  text-align: left;
  width: 100%;
  font-weight: normal;
}
.menu-category.active {
  background: #f3f4f6;
}
  .category-name {
  font-size: 1.1rem;
  font-weight: normal;
  font-family: inherit;
  flex: 1;
  letter-spacing: -0.01em;
  color: #000000;
}
.main-content {
  flex: 1;
  padding: 30px;
  background: #ffffff;
}
.search-container {
  margin-bottom: var(--spacing-xl);
}
.search-wrapper {
  position: relative;
  max-width: 600px;
}
.search-icon {
  position: absolute;
  left: 20px;
  top: 50%;
  transform: translateY(-50%);
  color: var(--text-gray);
  font-size: 1.1rem;
  z-index: 2;
  transition: all 0.3s ease;
}
  .search-input {
  width: 100%;
  padding: 18px 20px 18px 55px;
  border: 1px solid #e5e7eb;
  font-size: 1rem;
  font-weight: 400;
  font-family: inherit;
  color: #374151;
  background: #ffffff;
  outline: none;
  transition: border-color 0.3s ease;
  letter-spacing: -0.01em;
}
.search-input:focus {
  border-color: #9ca3af;
}
.search-input:focus + .search-icon {
  color: var(--primary-blue);
}
.page-title {
  margin-bottom: 30px;
  padding-bottom: 15px;
}
  .page-title h1 {
  font-size: 1.8rem;
  font-weight: 600;
  color: #374151;
  margin: 0;
  font-family: inherit;
}
.products-container {
  position: relative;
}
.loading-state {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 40px 20px;
  color: #6b7280;
  background: #ffffff;
  border: 1px solid #e5e7eb;
  margin: 20px;
}
.loading-spinner {
  width: 50px;
  height: 50px;
  border: 4px solid var(--border-gray);
  border-top: 4px solid var(--primary-blue);
  animation: spin 1s linear infinite;
  margin-bottom: var(--spacing-lg);
}
@keyframes spin {
  0% { transform: rotate(0deg); }
  100% { transform: rotate(360deg); }
}
.error-state {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 40px 20px;
  color: #6b7280;
  background: #ffffff;
  margin: 20px;
  border: 1px solid #e5e7eb;
}
.error-state i {
  font-size: 3rem;
  color: var(--primary-blue);
  margin-bottom: var(--spacing-lg);
  animation: bounce 2s infinite;
}
/*เด้งขึ้นเด้งลง ใช้กับไอคอน error (⚠️) */
@keyframes bounce {
  0%, 20%, 50%, 80%, 100% { transform: translateY(0); }
  40% { transform: translateY(-10px); }
  60% { transform: translateY(-5px); }
}
.retry-btn {
  background: #374151;
  color: #ffffff;
  border: none;
  padding: 14px 28px;
  font-weight: 600;
  cursor: pointer;
  transition: background-color 0.3s ease;
  margin-top: 20px;
  font-size: 1rem;
}
.kfc-products-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 24px;
  padding: 24px;
  max-width: 1200px;
  margin: 0 auto 40px;
}
.kfc-product-card {
  background: #ffffff;
  overflow: hidden;
  transition: all 0.3s ease;
  position: relative;
  display: flex;
  flex-direction: column;
  height: 100%;
  border: 1px solid #e5e7eb;
  cursor: pointer;
}
.kfc-product-card.out-of-stock {
  opacity: 0.6;
  filter: grayscale(40%);
}
.product-image-container {
  position: relative;
  width: 100%;
  aspect-ratio: 1 / 1; /* keep images square and consistent */
  overflow: hidden;
  background: #ffffff; /* subtle background when images have transparent/letterbox space */
  display: flex;
  align-items: center;
  justify-content: center;
}
.product-image {
  max-width: 85%;
  max-height: 85%;
  width: auto;
  height: auto;
  object-fit: contain;
  transition: transform 0.3s ease;
  display: block;
  object-position: center;
}

.stock-badge {
  position: absolute;
  top: 8px;
  right: 8px;
  background: rgba(255, 0, 0, 0.9);
  color: white;
  padding: 3px 8px;
  font-size: 10px;
  font-weight: 600;
  z-index: 2;
}
.product-details {
  padding: 20px;
  display: flex;
  flex-direction: column;
  flex: 1;
  background: #ffffff;
}
  .product-title {
  font-size: 1.1rem;
  font-weight: 600;
  color: #000000;
  margin: 0 0 8px 0;
  line-height: 1.4;
  font-family: inherit;
  min-height: 44px;
  display: -webkit-box;
  line-clamp: 2;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}
.product-desc {
  font-size: 0.85rem;
  color: #666666;
  margin: 0 0 12px 0;
  line-height: 1.4;
  display: -webkit-box;
  line-clamp: 2;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}
.product-bottom {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-top: auto;
  padding-top: 12px;
}
.price-container {
  flex: 1;
}
  .product-price {
  font-size: 1.3rem;
  font-weight: 700;
  color: #000000;
  font-family: inherit;
  margin-bottom: 4px;
}
.add-to-cart-btn {
  background: #1976d2;
  color: white;
  border: none;
  width: 40px;
  height: 32px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  transition: background-color 0.2s ease, transform 0.1s ease;
  font-size: 0.8rem;
  position: relative;
}
.add-to-cart-btn::before {
  content: '';
  position: absolute;
  top: 0;
  left: -100%;
  width: 100%;
  height: 100%;
  background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.4), transparent);
  transition: left 0.8s ease;
  transform: skew(20deg);
}
.add-to-cart-btn:disabled {
  background: #9ca3af;
  color: #ffffff;
  cursor: not-allowed;
  opacity: 0.7;
}
.add-to-cart-btn:disabled::before {
  display: none;
}
.add-to-cart-btn.in-cart {
  background: #10b981;
}
.add-to-cart-btn:active {
  transform: scale(0.98);
}
.add-to-cart-btn i {
  font-size: 0.85rem;
  transition: all 0.3s ease;
}
.add-to-cart-btn span {
  font-size: 0.85rem;
  font-weight: 600;
  letter-spacing: 0.2px;
  transition: all 0.3s ease;
}
.no-results {
  display: flex;
  justify-content: center;
  align-items: center;
  padding: var(--spacing-xl) var(--spacing-lg);
  margin: var(--spacing-lg);
}
.no-results-content {
  text-align: center;
  color: #6b7280;
  background: #ffffff;
  padding: 40px;
  border: 1px solid #e5e7eb;
}
.no-results-content i {
  font-size: 4rem;
  color: var(--primary-blue);
  margin-bottom: var(--spacing-lg);
  animation: float 3s ease-in-out infinite;
}
@keyframes float {
  0%, 100% { transform: translateY(0px); }
  50% { transform: translateY(-10px); }
}
.no-results-content h3 {
  font-size: 1.5rem;
  margin-bottom: var(--spacing-sm);
  color: var(--dark-gray);
  font-weight: 700;
}
.no-results-content p {
  font-size: 1rem;
  margin: 0;
  font-weight: 500;
}
.kfc-product-card:active {
  transform: scale(0.98);
}
@media screen and (max-width: 768px) {
  .kfc-products-grid {
    grid-template-columns: repeat(2, 1fr);
  }
  .sidebar-menu {
    display: none;
  }
  
}
</style>
<div class="kfc-product-page">
  <div class="sidebar-menu">
    <div class="menu-header">
      <h2>เมนู</h2>
    </div>
    <div class="menu-categories">
      <div *ngIf="loadingCategories" style="padding: 20px; text-align: center; color: #6b7280;">
        <div class="loading-spinner" style="margin: 0 auto 10px;"></div>
        <p style="font-size: 0.9rem;">กำลังโหลด...</p>
      </div>
      <div 
        *ngFor="let category of categories"
        class="menu-category"
        [class.active]="selectedCategory === category.id"
        (click)="selectCategory(category.id)">
        <span class="category-name">{{ category.name }}</span>
      </div>
    </div>
  </div>
  <div class="main-content">
    <div class="search-container">
      <div class="search-wrapper">
        <i class="fas fa-search search-icon"></i>
        <input 
          type="text" 
          placeholder="ค้นหาสินค้าในเมนู..." 
          [(ngModel)]="searchTerm"
          class="search-input">
      </div>
    </div>
    <div class="page-title">
      <h1>{{ getCategoryName() }}</h1>
    </div>
    <div class="products-container">
      <div *ngIf="loading" class="loading-state">
        <div class="loading-spinner"></div>
        <p>กำลังโหลดเมนู...</p>
      </div>
      <div *ngIf="error && !loading" class="error-state">
        <i class="fas fa-exclamation-triangle"></i>
        <p>{{ error }}</p>
        <button class="retry-btn" (click)="loadProducts()">ลองใหม่</button>
      </div>
      <div class="kfc-products-grid" *ngIf="!loading && !error && filteredProducts.length > 0">
        <div 
          *ngFor="let product of filteredProducts" 
          class="kfc-product-card"
          [class.out-of-stock]="!product.inStock">
          <div class="product-image-container">
            <img 
              [src]="product.image" 
              [alt]="product.product_name"
              (error)="onImageError($event)"
              class="product-image"
              loading="lazy">
            <div class="stock-badge" *ngIf="!product.inStock">หมด</div>
          </div>
          <div class="product-details">
            <h3 class="product-title">{{ product.product_name }}</h3>
            <p class="product-desc">คงเหลือ: {{ product.quantity }} ชิ้น</p>
            <div class="product-bottom">
              <div class="price-container">
                <span class="product-price">{{ product.price | currency:'THB':'symbol':'1.0-0' }}</span>
              </div>
              <button 
                class="add-to-cart-btn"
                [disabled]="!product.inStock"
                [class.in-cart]="isInCart(product.product_id)"
                (click)="selectProduct(product)">
                <i class="fas fa-shopping-cart" *ngIf="!isInCart(product.product_id) && product.inStock"></i>
                <span *ngIf="!product.inStock">หมด</span>
                <span *ngIf="product.inStock && !isInCart(product.product_id)"></span>
                <span *ngIf="product.inStock && isInCart(product.product_id)">{{ getCartQuantity(product.product_id) }} ชิ้น</span>
              </button>
            </div>
          </div>
        </div>
      </div>
      <div class="no-results" *ngIf="!loading && !error && filteredProducts.length === 0">
        <div class="no-results-content">
          <i class="fas fa-utensils"></i>
          <h3>ไม่พบเมนูที่ต้องการ</h3>
          <p>ลองค้นหาด้วยคำอื่น หรือเลือกหมวดหมู่อื่น</p>
        </div>
      </div>
    </div>
  </div>
</div>
